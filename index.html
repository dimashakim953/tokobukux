<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokoBukuX</title>

    <!-- Link ke CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <h2>📚 TokoBukuX</h2>
    <span>🔔</span>
</header>

<!-- ================= SEARCH ================= -->
<div class="search-box">
    <input type="text" placeholder="Cari buku, penulis, atau kategori" id="search">
</div>

<!-- ================= BANNER ================= -->
<section class="banner">
    <div>
        <h3>Diskon 20%</h3>
        <p>Untuk Semua Buku</p>
        <button>Belanja Sekarang</button>
    </div>
</section>

<!-- ================= KATEGORI ================= -->
<section class="kategori">
    <h3>Kategori</h3>
    <div class="kategori-list">
        <div>Novel</div>
        <div>Komik</div>
        <div>Pendidikan</div>
        <div>Teknologi</div>
    </div>
</section>

<!-- ================= BUKU ================= -->
<section class="buku">
    <h3>Buku Populer</h3>

    <div class="buku-list" id="bookList">
        <!-- Buku akan di-generate dari JS -->
    </div>
</section>

<!-- ================= NAVBAR ================= -->
<footer class="navbar">
    <span>🏠 Beranda</span>
    <span>📚 Kategori</span>
    <span>🛒 Keranjang</span>
    <span>👤 Profil</span>
</footer>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
